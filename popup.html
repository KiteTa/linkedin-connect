<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h2>LinkedIn Auto Connect</h2>

    <label class="field-label">Connect message:</label>

    <div class="var-btn-group">
      <button class="var-btn" data-var="name">🫥 Name</button>
      <button class="var-btn" data-var="title">💼 Title</button>
    </div>

    <div
      id="editor"
      contenteditable="true"
      placeholder="Hi {name}, I'd love to connect!"
    ></div>

    <div id="word-count">0 / 300 words</div>

    <button id="startBtn">Start Connect</button>

    <div id="status">
      <img id="status-icon" src="icons/owl.png" />
      <div id="status-text">Ready</div>
    </div>

    <div id="log"></div>

    <script src="popup.js"></script>
  </body>
</html>
